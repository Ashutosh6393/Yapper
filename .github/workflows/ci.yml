name: CI

on:
  pull_request:
  push:
    # TEMP(feat/ci-cd): smoke-test the image builds before merge. Revert to [main].
    branches: [main, feat/ci-cd]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.14"
  TURBO_TELEMETRY_DISABLED: "1"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  check:
    name: Lint, types, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bunx biome check .
      - run: bun run check-types
      - run: bun run build
        env:
          # The web build OOMs on the runner's default heap.
          NODE_OPTIONS: --max-old-space-size=4096

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: yapper
          POSTGRES_PASSWORD: yapper
          POSTGRES_DB: yapper
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U yapper -d yapper"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://yapper:yapper@localhost:5432/yapper
      REDIS_URL: redis://localhost:6379
      WEB_ORIGIN: http://localhost:3000
      BETTER_AUTH_URL: http://localhost:4000
      BETTER_AUTH_SECRET: ci-not-a-real-secret
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Apply migrations to the throwaway CI database
        run: bunx drizzle-kit migrate
        working-directory: packages/db
      # Serialized: concurrent `bun test` processes deadlock on the Postgres lock.
      - run: bunx turbo run test --concurrency=1

  images:
    name: Push ${{ matrix.app }} image
    needs: [check, test]
    # TEMP(feat/ci-cd): was `github.ref == 'refs/heads/main'`. Revert before merge.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [web, api, socket]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yapper-${{ matrix.app }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          # api and socket share the root Dockerfile; web needs its own (Next standalone).
          file: ${{ matrix.app == 'web' && 'apps/web/Dockerfile' || 'Dockerfile' }}
          push: true
          # TEMP(feat/ci-cd): prove the layers really build. Revert before merge.
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            APP=${{ matrix.app }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ vars.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_SYNC_ENGINE=${{ vars.NEXT_PUBLIC_SYNC_ENGINE }}
