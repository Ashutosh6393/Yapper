services:
  postgres:
    image: postgres:16-alpine
    container_name: yapper-postgres
    environment:
      POSTGRES_USER: yapper
      POSTGRES_PASSWORD: yapper
      POSTGRES_DB: yapper
    ports:
      - "5432:5432"
    volumes:
      - yapper-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapper -d yapper"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: yapper-redis
    ports:
      - "6379:6379"
    volumes:
      - yapper-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  yapper-pg:
  yapper-redis:
